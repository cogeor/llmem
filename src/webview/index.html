<!--
    Legacy host shell (loop 01): `renderShell()` in `src/webview/shell.ts` is
    the canonical source of truth for both the static and VS Code panels.
    This file is kept solely so `src/scripts/build_webview.ts` can copy it to
    `dist/webview/index.html`, which `src/claude/web-launcher.ts` and the
    `tests/integration/arch-watcher.test.ts` precondition check use as a
    sentinel for asset-root resolution. The static generator no longer reads
    this file. Edits made here have no runtime effect outside that sentinel
    path — update `src/webview/shell.ts` instead.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project View</title>
    <!-- CSS will be copied here -->
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/tree.css">
    <link rel="stylesheet" href="styles/detail.css">
    <link rel="stylesheet" href="styles/graph.css">
    <link rel="stylesheet" href="styles/folder-structure.css">
</head>

<body>
    <!-- Loop 16: tri-state route toggle (Graph / Design / Packages). Mounted
         by main.ts via the ViewToggle component. CSS polish (positioning,
         spacing) deferred to a follow-up pass; this is a top-level strip
         above the 3-pane app shell. -->
    <div id="view-toggle" class="view-toggle-host"></div>
    <div id="app" class="layout-row">
        <!-- Explorer Pane -->
        <div id="explorer-pane" class="pane" style="width: 250px;">
            <div class="pane-header">
                <span class="pane-title" id="explorer-title"><span class="pane-icon"></span></span>
                <div class="toolbar">
                    <button id="theme-toggle" class="icon-btn" title="Toggle Theme">☀️</button>
                </div>
            </div>
            <div class="pane-content" id="worktree-root">
                <!-- Tree rendered here -->
            </div>
        </div>

        <!-- Splitter 1 -->
        <div class="splitter" id="splitter-1"></div>

        <!-- Design Pane -->
        <div id="design-pane" class="pane" style="flex: 1;">
            <div class="pane-header">
                <span class="pane-title" id="design-title"><span class="pane-icon"></span></span>
                <div class="toolbar">
                    <div id="design-mode-toggle"></div>
                </div>
            </div>
            <div class="pane-content">
                <div id="design-view" class="detail-view"></div>
            </div>
        </div>

        <!-- Splitter 2 -->
        <div class="splitter" id="splitter-2"></div>

        <!-- Graph Pane -->
        <div id="graph-pane" class="pane" style="flex: 1;">
            <div class="pane-header">
                <span class="pane-title" id="graph-title"><span class="pane-icon"></span></span>
                <div class="toolbar">
                    <div id="graph-type-toggle"></div>
                </div>
            </div>
            <div class="pane-content graph-pane-content">
                <!-- Graph needs hidden overflow for pan/zoom -->
                <div id="graph-view" class="graph-container">
                    <div class="graph-canvas"></div>
                </div>
                <!-- PackageView mount point (cards + arcs, memo/design/02 second half). -->
                <div id="package-view" style="display: none; width: 100%; height: 100%; overflow: auto;"></div>
                <!-- FolderStructureView mount point (orthogonal folder graph, memo/design/02 first half). -->
                <div id="folder-structure-view" style="display: none; width: 100%; height: 100%; overflow: auto;"></div>
            </div>
        </div>
    </div>

    <!-- Data Injection Scripts (inserted by generator) -->
    <!-- <script src="work_tree.js"></script> -->
    <!-- <script src="graph_data.js"></script> -->

    <!-- vis-network library (loop 15: PackageView arcs) -->
    <script src="libs/vis-network.min.js"></script>

    <!-- Main Module -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
