name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # 20.19.0 is the declared engines.node floor (PH-01): chokidar 5 is
        # ESM-only and require()ing it throws ERR_REQUIRE_ESM below 20.19.0,
        # so CI must exercise the exact floor, not a floating 20.x.
        node-version: ['20.19.0', 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Compile
      run: npm run compile

    - name: Run Tests
      run: npm test
